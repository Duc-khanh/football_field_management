<div th:fragment="header" class="header">
    <!-- Bên trái: Toggle + Logo + Tên web -->
    <div class="left">
        <i class="fa-solid fa-bars icon-btn" id="toggleSidebar"></i>
        <img src="/images/test.jpg" alt="Logo" class="logo">
        <h5 class="mb-0 fw-bold text-dark">Sân Bóng 247</h5>
    </div>

    <!-- Bên phải: Thông tin người dùng -->
    <div class="right user-info">
        <i class="fa-regular fa-bell icon-btn"></i>
        <div class="d-flex flex-column align-items-start">
            <span th:text="${session.fullName}">User Name</span>
            <small th:text="${session.userEmail}">user@mail.com</small>
        </div>
        <img src="https://i.pravatar.cc/40" alt="avatar">
    </div>
</div>
