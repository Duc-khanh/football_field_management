<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/authenticate.css">
</head>
<body>
<div class="login-page d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center gx-0 shadow-lg rounded-4 overflow-hidden auth-wrap">
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-side">
                <div class="text-white text-center px-4 position-relative z-1">
                    <h1 class="mb-3 brand-title">Sanbong247</h1>
                    <p class="lead mb-4">Chào mừng! Đăng nhập hoặc đăng ký ngay để tiếp tục.</p>
                </div>
            </div>
            <div class="col-12 col-md-6 bg-white p-4 p-md-5">
                <div class="d-flex justify-content-between mb-5">
                    <div>
                        <h2 class="mb-0">Đăng nhập</h2>
                    </div>
                </div>

                <form th:action="@{/auth/login}" method="post" class="needs-validation" novalidate>
                    <div class="input-field mb-4">
                        <input type="text" name="email" id="email" required autocomplete="off"
                               pattern="(^\+?\d{9,15}$|^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$)">
                        <label for="email">Email</label>
                        <div class="invalid-feedback">Vui lòng nhập email hoặc số điện thoại hợp lệ.</div>
                    </div>

                    <div class="input-field mb-4">
                        <input type="password" name="password" id="password" required autocomplete="off">
                        <label for="password">Mật khẩu</label>
                        <i class="bi bi-eye passicon" id="togglePassword"></i>
                        <div class="invalid-feedback">Vui lòng nhập mật khẩu.</div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger small">
                        Sai tài khoản/mật khẩu hoặc tài khoản đã bị khóa.
                    </div>


                    <!-- Ghi nhớ và Quên mật khẩu -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">
                                Ghi nhớ mật khẩu
                            </label>
                        </div>
                        <a href="/auth/forgot-password" class="small text-decoration-none">Quên mật khẩu?</a>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                    </div>

                    <div class="d-flex gap-2 mb-4">
                        <!-- Google Login -->
                        <a href="/oauth2/authorization/google" class="btn btn-light border w-100 d-flex align-items-center justify-content-center">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" width="20" height="20" class="me-2">
                            <span>Đăng nhập bằng Google</span>
                        </a>
                    </div>

                    <div class="text-center">
                        <span class="small text-muted">Chưa có tài khoản?</span>
                        <a href="/auth/register" class="small text-decoration-none">Đăng ký ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/authenticate.js}" src="/js/authenticate.js"></script>
</body>
</html>
