<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-page d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center gx-0 shadow-lg rounded-4 overflow-hidden auth-wrap">
            <div class="col-md-6 d-none d-md-flex bg-side align-items-center justify-content-center">

                <div class="text-white text-center px-4">
                    <h1 class="mb-3 brand-title">Sanbong247</h1>
                    <p class="lead mb-4">Đăng nhập hoặc đăng ký ngay để tiếp tục.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 bg-white p-4 p-md-5">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <h2 class="mb-0">Đăng nhập</h2>
                    </div>
                </div>
                <form th:action="@{/auth/login}" method="post" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email hoặc số điện thoại</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi-person-fill"></i>
                            </span>
                            <input name="email" type="email" class="form-control border-start-0" id="email"
                                   placeholder="you@example.com" required>
                            <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <div class="input-group input-group-lg shadow-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-key-fill"></i></span>
                            <input name="password" type="password" class="form-control border-start-0" id="password"
                                   placeholder="••••••••" required aria-describedby="togglePassword">
                            <div class="invalid-feedback">Vui lòng nhập mật khẩu.</div>
                        </div>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger small">
                        Sai tài khoản/mật khẩu hoặc tài khoản đã bị khóa.
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="showPassword">
                            <label class="form-check-label small" for="showPassword">Hiện thị mật khẩu</label>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                    </div>

                    <div class="text-center">
                        <span class="small text-muted">Chưa có tài khoản?</span>
                        <a href="/auth/register" class="ms-2">Đăng ký ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/js/login.js" th:src="@{/js/login.js}"></script>
</body>
</html>
