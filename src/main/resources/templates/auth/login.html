<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-container">
    <div class="card">
        <h3 class="text-center mb-4">Đăng nhập</h3>
        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-icon-wrapper">
                    <input name="email" type="text" class="form-control login-input" id="email" required>
                    <span class="input-icon">
            <i class="bi bi-envelope-fill"></i>
        </span>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu</label>
                <div class="input-icon-wrapper">
                    <input name="password" type="password" class="form-control login-input" id="password" required>
                    <button type="button" class="btn-icon-eye" aria-label="Hiện/Ẩn mật khẩu">
                        <i class="bi bi-eye-fill"></i>
                    </button>
                </div>
            </div>


        <div th:if="${param.error}" class="alert alert-danger">
            Sai tài khoản/mật khẩu hoặc tài khoản đã bị khóa.
        </div>



            <div class="text-center mb-2">
                <button type="submit" class="btn btn-primary px-5">Đăng nhập</button>
            </div>

            <div class="text-center">
                <a href="/register" class="btn btn-outline-secondary btn-sm">Đăng ký tài khoản</a>
            </div>
        </form>
    </div>

</div>


<script th:src="@{/js/login.js}" src="/js/login.js"></script>
</body>
</html>
