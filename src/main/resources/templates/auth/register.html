<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/authenticate.css">
</head>
<body>
<div class="login-page d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center gx-0 shadow-lg rounded-4 overflow-hidden auth-wrap">
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-side">
                <div class="text-white text-center px-4 position-relative z-1">
                    <h1 class="mb-3 brand-title">Sanbong247</h1>
                    <p class="lead mb-4">Tham gia ngay để đặt sân và quản lý tiện lợi.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 bg-white p-4 p-md-5">
                <h2 class="mb-4">Đăng ký tài khoản</h2>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/auth/register}" th:object="${account}" method="post" class="needs-validation" novalidate id="registerForm">
                    <div class="input-field mb-3">
                        <input type="text" th:field="*{fullName}" id="fullName" required autocomplete="off">
                        <label for="fullName">Họ và tên</label>
                        <div class="invalid-feedback">Vui lòng nhập họ tên.</div>
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                    </div>

                    <div class="input-field mb-3">
                        <input type="email" th:field="*{email}" id="email" required autocomplete="off">
                        <label for="email">Email</label>
                        <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>

                    <div class="input-field mb-3">
                        <input type="text" th:field="*{phone}" id="phone" required autocomplete="off"
                               pattern="^0\d{9}$"
                               title="Số điện thoại phải có 10 chữ số và bắt đầu bằng số 0">
                        <label for="phone">Số điện thoại</label>
                        <div class="invalid-feedback">Vui lòng nhập số điện thoại hợp lệ (10 chữ số, bắt đầu 0).</div>
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>


                    <div class="input-field mb-3">
                        <input type="password" th:field="*{password}" id="password" required minlength="6" autocomplete="off">
                        <label for="password">Mật khẩu</label>
                        <div class="invalid-feedback">Mật khẩu tối thiểu 6 ký tự.</div>
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="input-field mb-3">
                        <input type="password" th:field="*{confirmPassword}" id="confirmPassword" required minlength="6" autocomplete="off">
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                        <div class="invalid-feedback">Vui lòng xác nhận mật khẩu.</div>
                        <p class="text-danger small mt-1" id="mismatchMsg" style="display:none;">Mật khẩu không khớp.</p>
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng ký</button>
                    </div>

                    <div class="text-center">
                        <span class="small text-muted">Đã có tài khoản?</span>
                        <a th:href="@{/auth/login}" class="small text-decoration-none">Đăng nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/authenticate.js}" src="/js/authenticate.js"></script>
</body>
</html>
