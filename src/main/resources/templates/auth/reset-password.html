<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Mật Khẩu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .input-container {
            position: relative;
            margin: 10px 0;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
        }
        .toggle-btn:hover {
            color: #333;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button[type="submit"]:hover {
            background-color: #0056b3;
        }
        .message {
            text-align: center;
            margin-top: 15px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Reset Mật Khẩu</h2>
    <form action="#" th:action="@{/auth/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <div class="input-container">
            <input type="password" id="password" name="password" placeholder="Mật khẩu mới" required>
            <button type="button" class="toggle-btn" onclick="togglePassword('password')">👁</button>
        </div>
        <div class="input-container">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
            <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword')">👁</button>
        </div>
        <button type="submit">Cập nhật mật khẩu</button>
    </form>
    <p class="message success" th:text="${successMessage}"></p>
    <p class="message error" th:text="${errorMessage}"></p>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
    }
</script>
</body>
</html>
