<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang quản trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/homeAdmin.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="fragments/headerAdmin :: header"></div>

<div class="d-flex flex-grow-1">

    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <div class="d-flex flex-column flex-grow-1">

        <div id="content" class="flex-grow-1 p-4">
            <div class="d-flex flex-wrap justify-content-center card-gap-large">
                <a href="/admin/users"
                   class="card nav-card text-center text-decoration-none p-3 shadow-sm d-flex flex-column align-items-center justify-content-center">
                    <span class="icon fs-2 mb-2"><i class="fa-solid fa-user"></i></span>
                    <span class="text fw-semibold">Quản lý tài khoản</span>
                </a>
                <a href="/admin/products"
                   class="card nav-card text-center text-decoration-none p-3 shadow-sm d-flex flex-column align-items-center justify-content-center">
                    <span class="icon fs-2 mb-2"><i class="fa-solid fa-futbol"></i></span>
                    <span class="text fw-semibold">Quản lý sân bóng</span>
                </a>
                <a href="/admin/revenue"
                   class="card nav-card text-center text-decoration-none p-3 shadow-sm d-flex flex-column align-items-center justify-content-center">
                    <span class="icon fs-2 mb-2"><i class="fa-solid fa-coins"></i></span>
                    <span class="text fw-semibold">Quản lý doanh thu</span>
                </a>
                <a href="/admin/reports"
                   class="card nav-card text-center text-decoration-none p-3 shadow-sm d-flex flex-column align-items-center justify-content-center">
                    <span class="icon fs-2 mb-2"><i class="fa-solid fa-chart-bar"></i></span>
                    <span class="text fw-semibold">Quản lý báo cáo</span>
                </a>
            </div>
        </div>
    </div>
</div>

<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/homeAdmin.js}"></script>
</body>
</html>
