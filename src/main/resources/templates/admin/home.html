<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang quản trị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/homeAdmin.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragments/headerAdmin :: header}"></div>

<div class="d-flex flex-grow-1">

    <!-- Sidebar menu -->
    <div th:replace="~{fragments/menuAdmin :: menuAdmin}"></div>

    <!-- Main content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="flex-grow-1 p-4">
            <h2 class="fw-bold mb-4 text-center text-primary">Bảng điều khiển</h2>
            <div class="nav-card-container">

                <a href="/accounts" class="nav-card text-decoration-none">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="nav-card-text">Quản lý tài khoản</div>
                </a>

                <a href="/admin/venue/list" class="nav-card text-decoration-none">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-futbol"></i>
                    </div>
                    <div class="nav-card-text">Quản lý sân bóng</div>
                </a>

                <a href="/admin/revenue" class="nav-card text-decoration-none">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-coins"></i>
                    </div>
                    <div class="nav-card-text">Quản lý doanh thu</div>
                </a>

                <a href="/admin/reports" class="nav-card text-decoration-none">
                    <div class="nav-card-icon">
                        <i class="fa-solid fa-chart-bar"></i>
                    </div>
                    <div class="nav-card-text">Quản lý báo cáo</div>
                </a>

            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/footerAdmin :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/homeAdmin.js}"></script>
</body>
</html>
