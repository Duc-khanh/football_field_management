<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Sân Bóng 247</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* --- LAYOUT CHUNG --- */
        body {
            background-color: #f5f7fa;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER CỐ ĐỊNH DƯỚI CÙNG --- */
        .header-fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            z-index: 1000;

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;

            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
        }

        .header-fixed-bottom .left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-fixed-bottom .logo {
            height: 50px;
            width: auto;
        }

        .header-fixed-bottom .right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* --- SIDEBAR TRÁI --- */
        .sidebar {
            width: 250px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #555;
            font-weight: 500;
            text-decoration: none;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #f0f4ff;
            color: #0d6efd;
            border-left: 4px solid #0d6efd;
        }

        .sidebar .icon {
            width: 30px;
            text-align: center;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        /* --- CONTENT --- */
        .content {
            margin-left: 250px; /* lệch sidebar */
            margin-bottom: 70px; /* tránh header dưới cùng */
            padding: 30px;
            flex-grow: 1;
        }

        /* --- FOOTER FULL WIDTH --- */
        footer {
            width: 100%;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-primary">Quản Lý Duyệt Chủ Sân</h3>
    </div>

    <div class="card shadow-sm border-0 mb-4">

        <div class="card-header bg-white py-3">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0 fw-bold"><i class="fa-solid fa-list me-2"></i>Danh sách chờ duyệt</h5>

                <form class="d-flex" th:action="@{/admin/browseAccount}" method="get">
                    <input class="form-control form-control-sm me-2" type="search" placeholder="Tìm kiếm tên hoặc email"
                           name="keyword" th:value="${keyword}" style="width: 250px;">
                    <button class="btn btn-primary btn-sm" type="submit"><i class="fa-solid fa-search"></i></button>
                </form>
            </div>
        </div>

        <div class="table-responsive" th:if="${ownersPage.content.size() > 0}">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th class="text-center">STT</th>
                    <th>Họ tên</th>
                    <th>Email / SĐT</th>
                    <th>Địa chỉ</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="owner, iter : ${ownersPage.content}">
                    <td class="text-center fw-bold text-muted"
                        th:text="${ownersPage.number * ownersPage.size + iter.index + 1}"></td>

                    <td>
                        <div class="fw-bold" th:text="${owner.fullName}"></div>
                        <small class="text-muted">Chủ sân mới</small>
                    </td>

                    <td>
                        <div th:text="${owner.email}"></div>
                        <small class="text-primary" th:text="${owner.phone}"></small>
                    </td>

                    <td th:text="${owner.address}"></td>

                    <td class="text-center">
                        <a th:href="@{/admin/approve/{id}(id=${owner.account_id}, status='APPROVED', page=${currentPage}, keyword=${keyword})}"
                           onclick="confirmApprove(event, this.href)"
                           class="btn btn-success btn-sm me-2">
                            <i class="fa-solid fa-check"></i> Duyệt
                        </a>

                        <a th:href="@{/admin/approve/{id}(id=${owner.account_id}, status='REJECTED', page=${currentPage}, keyword=${keyword})}"
                           onclick="confirmReject(event, this.href)"
                           class="btn btn-outline-danger btn-sm">
                            <i class="fa-solid fa-xmark"></i> Từ chối
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- PHÂN TRANG -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">

                    <li class="page-item" th:classappend="${ownersPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/browseAccount(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i} == ${currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/admin/browseAccount(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${ownersPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/browseAccount(page=${currentPage + 1}, keyword=${keyword})}">Tiếp</a>
                    </li>

                </ul>
            </nav>
        </div>

        <div th:if="${ownersPage.content.size() == 0}" class="alert alert-info text-center py-4">
            <i class="fa-solid fa-folder-open fa-2x mb-3 d-block text-muted"></i>
            Chưa có tài khoản nào cần duyệt.
        </div>

    </div>

</div> <!-- end content -->



<!-- FOOTER -->
<footer th:replace="~{fragments/admin-footer :: adminFooter}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmApprove(event, url) {
        event.preventDefault();
        Swal.fire({
            title: 'Xác nhận duyệt?',
            text: 'Bạn có chắc chắn muốn duyệt tài khoản này?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Duyệt',
            cancelButtonColor: '#6c757d',
            confirmButtonColor: '#28a745'
        }).then(result => {
            if (result.isConfirmed) window.location.href = url;
        });
    }

    function confirmReject(event, url) {
        event.preventDefault();
        Swal.fire({
            title: 'Xác nhận từ chối?',
            text: 'Bạn có chắc chắn muốn từ chối tài khoản này?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Từ chối',
            cancelButtonText: 'Hủy',
            confirmButtonColor: '#dc3545'
        }).then(result => {
            if (result.isConfirmed) window.location.href = url;
        });
    }
</script>

</body>
</html>
