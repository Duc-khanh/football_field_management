<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa tài khoản</title>

    <!-- Bootstrap + FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS riêng -->
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>
<body>
<!-- Header -->
<div th:replace="fragments/headerAdmin :: header"></div>

<!-- Layout chính -->
<div class="d-flex">
    <!-- Sidebar/Menu -->
    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <!-- Nội dung chính -->
    <main class="main-content p-4 flex-grow-1">
        <div class="container-fluid">
            <h2 class="mb-4">Sửa tài khoản</h2>

            <form th:action="@{'/accounts/edit/' + ${account.account_id}}"
                  th:object="${account}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{account_id}"/>

                <div class="row">
                    <!-- Cột trái: thông tin -->
                    <div class="col-md-8">
                        <div class="mb-3">
                            <label class="form-label">Họ tên</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" readonly/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu (để trống nếu không đổi)</label>
                            <input type="password" th:field="*{password}" class="form-control"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option th:value="true"  th:selected="${account.status == true}">Active</option>
                                <option th:value="false" th:selected="${account.status == false}">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <!-- Cột phải: avatar -->
                    <div class="col-md-4 text-center">
                        <label class="form-label">Ảnh đại diện</label><br>
                        <img id="avatarPreview"
                             th:src="@{'/uploads/avatars/' + ${account.avt_path}}"
                             alt="Avatar"
                             class="img-thumbnail rounded-circle mb-3"
                             style="width:150px; height:150px; object-fit:cover;">

                        <div class="mb-3">
                            <input type="file" name="avatarFile" class="form-control" accept="image/*"
                                   onchange="previewImage(event)"/>
                        </div>
                    </div>
                </div>

                <!-- Nút hành động -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fa-solid fa-save me-1"></i> Cập nhật
                    </button>
                    <a th:href="@{/accounts}" class="btn btn-secondary">
                        <i class="fa-solid fa-xmark me-1"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>

<!-- Script -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/homeAdmin.js}"></script>
<script>
    function previewImage(event) {
        const preview = document.getElementById("avatarPreview");
        const file = event.target.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    }
</script>
</body>
</html>
