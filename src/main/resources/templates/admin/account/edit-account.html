<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa tài khoản</title>

    <!-- Bootstrap + FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS riêng -->
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="fragments/headerAdmin :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <!-- Content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <h2 class="m-0"><i class="fa-solid fa-user-pen me-2"></i>Sửa tài khoản</h2>
                <a th:href="@{/accounts}" class="btn btn-secondary">
                    Quay lại
                </a>
            </div>

            <div class="card shadow-sm rounded-3 p-4">
                <form th:action="@{'/accounts/edit/' + ${account.account_id}}"
                      th:object="${account}" method="post" class="needs-validation" novalidate>
                    <input type="hidden" th:field="*{account_id}"/>

                    <div class="row">
                        <!-- Cột trái -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Họ tên</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" readonly/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mật khẩu (để trống nếu không đổi)</label>
                                <input type="password" th:field="*{password}" class="form-control"/>
                            </div>
                        </div>

                        <!-- Cột phải -->
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Điện thoại</label>
                                <input type="text" th:field="*{phone}" class="form-control"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" th:field="*{address}" class="form-control"/>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Trạng thái</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="1" th:selected="${account.status == 1}">Active</option>
                                    <option value="0" th:selected="${account.status == 0}">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Nút hành động căn ra giữa -->
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Cập nhật
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/homeAdmin.js}"></script>
</body>
</html>
