<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Sửa tài khoản</h2>
    <form th:action="@{'/accounts/edit/' + ${account.account_id}}"
          th:object="${account}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{account_id}"/>

        <div class="mb-3">
            <label class="form-label">Họ tên</label>
            <input type="text" th:field="*{fullName}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" readonly/>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>


        <div class="mb-3">
            <label class="form-label">Mật khẩu (để trống nếu không đổi)</label>
            <input type="password" th:field="*{password}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Điện thoại</label>
            <input type="text" th:field="*{phone}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <input type="text" th:field="*{address}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Trạng thái</label>
            <select th:field="*{status}" class="form-select">
                <option th:value="true"  th:selected="${account.status == true}">Active</option>
                <option th:value="false" th:selected="${account.status == false}">Inactive</option>
            </select>
        </div>

        <!-- Avatar -->
        <div class="mb-3">
            <label class="form-label">Ảnh đại diện</label><br>
            <img id="avatarPreview"
                 th:src="@{'/uploads/avatars/' + ${account.avt_path}}"
                 alt="Avatar"
                 style="width:120px; height:120px; object-fit:cover; border-radius:50%; border:1px solid #ddd;">

            <br>
            <label class="form-label mt-2">Chọn ảnh</label>
            <input type="file" name="avatarFile" class="form-control" accept="image/*"  onchange="previewImage(event)"/>
        </div>

        <button type="submit" class="btn btn-success">Cập nhật</button>
        <a th:href="@{/accounts}" class="btn btn-secondary">Hủy</a>
    </form>
</div>

<!-- Script thay thế ảnh -->
<script>
    function previewImage(event) {
        const preview = document.getElementById("avatarPreview");
        const file = event.target.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    }
</script>
</body>
</html>
