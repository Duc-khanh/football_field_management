<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Thêm tài khoản mới</h2>
    <form th:action="@{/accounts/add}" th:object="${account}" enctype="multipart/form-data" method="post">
        <div class="mb-3">
            <label class="form-label">Họ tên</label>
            <input type="text" th:field="*{fullName}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" th:field="*{password}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Điện thoại</label>
            <input type="text" th:field="*{phone}" class="form-control"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <input type="text" th:field="*{address}" class="form-control" required/>
        </div>
<!--        <div class="mb-3">-->
<!--            <label class="form-label">Trạng thái</label>-->
<!--            <select th:field="*{status}" class="form-select">-->
<!--                <option value="1">Active</option>-->
<!--                <option value="0">Inactive</option>-->
<!--            </select>-->
<!--        </div>-->

        <div class="mb-3">
            <label class="form-label">Avatar</label>
            <input type="file" name="avatarFile" class="form-control" accept="image/*" onchange="previewAvatar(event)"/>
            <div class="mt-3">
                <img id="avatarPreview" src="" alt="Avatar Preview" class="img-thumbnail" style="max-width: 200px; display: none;"/>
            </div>
        </div>

        <button type="submit" class="btn btn-success">Lưu</button>
        <a th:href="@{/accounts}" class="btn btn-secondary">Hủy</a>
    </form>
</div>

<script>
    function previewAvatar(event) {
        const file = event.target.files[0];
        const preview = document.getElementById("avatarPreview");

        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            }
            reader.readAsDataURL(file);
        } else {
            preview.src = "";
            preview.style.display = "none";
        }
    }
</script>
</body>
</html>
