<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="fragments/headerAdmin :: header"></div>

<div class="d-flex flex-grow-1">
    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách User</h2>

            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/accounts/search}" method="get"
                      class="search-form d-flex flex-grow-1 gap-2 mb-0">
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input"
                           placeholder="Tìm kiếm theo tên hoặc email">
                    <button type="submit" class="btn btn-outline-primary">
                        <i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm
                    </button>
                </form>

                <a class="btn btn-primary" th:href="@{/accounts/add}">
                    <i class="fa-solid fa-plus me-1"></i> Thêm account
                </a>
            </div>

            <div class="table-responsive shadow-sm rounded-3 bg-white p-2">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width:70px">ID</th>
                        <th style="width:80px">Avatar</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th style="width:110px">Status</th>
                        <th>Roles</th>
                        <th style="width:250px">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account : ${accounts}">
                        <td th:text="${account.account_id}"></td>
                        <td>
                            <img th:src="@{'/uploads/avatars/' + ${account.avt_path}}"
                                 alt="Avatar"
                                 style="width:50px; height:50px; object-fit:cover; border-radius:50%;">
                        </td>
                        <td th:text="${account.fullName}"></td>
                        <td th:text="${account.email}"></td>
                        <td th:text="${account.phone}"></td>
                        <td th:text="${account.address}"></td>
                        <td>
                            <span th:text="${account.status} ? 'Active' : 'Block'"
                                  th:classappend="${account.status} ? 'badge status-active' : 'badge status-block'">
                            </span>
                        </td>
                        <td>
                            <span th:each="role : ${account.roles}"
                                  th:text="${role.role_name}"
                                  class="role-badge me-1">Role</span>
                        </td>
                        <td class="actions">
                            <a class="btn btn-sm btn-warning me-1"
                               th:href="@{'/accounts/edit/' + ${account.account_id}}">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            <a class="btn btn-sm btn-outline-primary me-1"
                               th:href="@{'/accounts/' + ${account.account_id}}">
                                <i class="fa-solid fa-eye"></i> Xem
                            </a>
                            <a th:href="@{'/accounts/toggle/' + ${account.account_id}}"
                               th:text="${account.status} ? 'Khóa' : 'Mở khóa'"
                               th:attr="data-status=${account.status}"
                               class="btn btn-sm toggle-btn"
                               th:classappend="${account.status} ? 'btn-danger' : 'btn-success'">
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(accounts)}">
                        <td colspan="9" class="text-center py-4 text-muted">Không có bản ghi nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-3 d-flex justify-content-end">
                <!-- Pagination -->
            </div>

        </div>
    </div>
</div>

<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/homeAdmin.js}"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toggleButtons = document.querySelectorAll(".toggle-btn");
        toggleButtons.forEach(btn => {
            btn.addEventListener("click", function (event) {
                const status = btn.getAttribute("data-status") === "true";
                const action = status ? "khóa" : "mở khóa";
                if (!confirm(`Bạn có chắc chắn muốn ${action} tài khoản này không?`)) {
                    event.preventDefault();
                }
            });
        });
    });
</script>

</body>
</html>
