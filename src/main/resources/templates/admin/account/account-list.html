<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách User</title>
    <meta charset="UTF-8">
</head>
<body>
<h2>Danh sách User</h2>
<a th:href="@{/accounts/add}">➕ Thêm account</a>
<form th:action="@{/accounts/search}" method="get" class="mb-3">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm theo tên hoặc email">
    <button type="submit">Tìm kiếm</button>
</form>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Status</th>
        <th>Roles</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="account : ${accounts}">
        <td th:text="${account.account_id}"></td>
        <td th:text="${account.fullName}"></td>
        <td th:text="${account.email}"></td>
        <td th:text="${account.phone}"></td>
        <td th:text="${account.address}"></td>
        <td th:text="${account.status} ? 'Active' : 'Block'"></td>
        <td>
            <span th:each="role : ${account.roles}" th:text="${role.role_name}">Role</span>
        </td>
        <td>
            <a th:href="@{'/accounts/' + ${account.account_id}}">Xem</a>
            <a th:href="@{'/accounts/edit/' + ${account.account_id}}">Xem</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
