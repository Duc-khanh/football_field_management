<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/account-list.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <style>
        .form-select {
            width: 200px;
            min-width: 150px;
            max-width: 250px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            cursor: pointer;
        }

        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 4px rgba(13,110,253,0.4);
        }
        .search-input {
            width: 250px;   /* ngắn gọn vừa phải */
            flex: none;     /* không kéo dãn full */
        }

    </style>
</head>
<body class="d-flex flex-column min-vh-100"
      th:data-success-message="${successMessage}"
      th:data-error-message="${errorMessage}">
<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách tài khoản</h2>

            <!-- Search + Add -->
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/accounts}" method="get"
                      class="search-form d-flex flex-grow-1 gap-2 mb-0" id="searchForm">
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input"
                           placeholder="Tìm kiếm..." id="searchInput">

                    <select id="roleFilter" name="role" class="form-select">
                        <option value="" th:selected="${role == null or role == ''}">-- Vai trò --</option>
                        <th:block th:each="r : ${roles}">
                            <option th:value="${r.role_name}"
                                    th:text="${#strings.replace(r.role_name, 'ROLE_', '')}"
                                    th:selected="${role == r.role_name}">
                            </option>
                        </th:block>
                    </select>
                </form>

                <a class="btn btn-primary" th:href="@{/accounts/add}">
                    Thêm tài khoản
                </a>
            </div>


            <!-- Table -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width:70px">STT</th>
                        <th style="width:80px">Ảnh</th>
                        <th>Họ và tên</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Địa chỉ</th>
                        <th style="width:110px">Trạng thái</th>
                        <th>Vai trò</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="account, stat : ${accounts}">
                        <td th:text="${currentPage * pageSize + stat.index + 1}"></td>
                        <td>
                            <img th:src="${account.avt_path != null and !#strings.isEmpty(account.avt_path)
              ? '/uploads/avatars/' + account.avt_path
              : '/images/avatar.png'}"
                                 alt="Avatar"
                                 onerror="this.onerror=null; this.src='/images/avatar.png';"
                                 style="width:50px; height:50px; object-fit:cover; border-radius:50%;">
                        </td>

                        <td class="text-start" th:text="${account.fullName}"></td>
                        <td class="text-start" th:text="${account.email}"></td>
                        <td th:text="${account.phone}"></td>
                        <td class="text-start" th:text="${account.address}"></td>
                        <td>
                <span th:text="${account.status} ? 'Hoạt động' : 'Bị khóa'"
                      th:classappend="${account.status} ? 'badge status-active' : 'badge status-block'">
                </span>
                        </td>
                        <td>
                <span th:each="role : ${account.roles}"
                      th:text="${#strings.replace(role.role_name, 'ROLE_', '')}"
                      class="role-badge me-1">Role</span>
                        </td>
                        <td class="actions">
                            <!-- Edit -->
                            <a class="btn btn-sm btn-warning me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               th:href="@{'/accounts/edit/' + ${account.account_id}}"
                               title="Sửa" aria-label="Sửa">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </a>

                            <!-- View -->
                            <a class="btn btn-sm btn-outline-primary me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               th:href="@{'/accounts/' + ${account.account_id}}"
                               title="Xem" aria-label="Xem">
                                <i class="fa-solid fa-eye"></i>
                            </a>

                            <!-- Toggle lock/unlock -->
                            <a th:href="@{'/accounts/toggle/' + ${account.account_id}}"
                               class="btn btn-sm toggle-btn d-inline-flex align-items-center justify-content-center btn-icon"
                               th:classappend="${account.status} ? ' btn-danger' : ' btn-success'"
                               th:attr="data-status=${account.status}, aria-label=${account.status} ? 'Khóa tài khoản' : 'Mở khóa tài khoản'"
                               th:title="${account.status} ? 'Khóa tài khoản' : 'Mở khóa tài khoản'">
                                <i th:class="${account.status} ? 'fa-solid fa-lock' : 'fa-solid fa-lock-open'"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(accounts)}">
                        <td colspan="9" class="text-center py-4 text-muted">Không có bản ghi nào</td>
                    </tr>
                    </tbody>
                </table>

            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/accounts(page=${currentPage - 1}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/accounts(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/accounts(page=${currentPage + 1}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div id="footer">
    <div th:replace="fragments/admin-footer :: adminFooter"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const roleFilter = document.getElementById("roleFilter");
        const searchForm = document.getElementById("searchForm");

        if (roleFilter && searchForm) {
            roleFilter.addEventListener("change", () => {
                searchForm.submit(); // Tự động submit form
            });
        }
    });
</script>
</body>
</html>
