<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa tài khoản</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/avatar-edit.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="fragments/admin-sidebar :: menuAdmin"></div>

    <!-- Content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <!-- Title + Button -->
            <div class="d-flex align-items-center justify-content-between mb-4 gap-3">
                <h2 class="m-0">Sửa tài khoản</h2>
            </div>

            <!-- Form -->
            <div class="shadow-sm rounded-3 bg-white p-4">
                <form th:action="@{'/accounts/edit/' + ${account.account_id}}"
                      th:object="${account}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden" th:field="*{account_id}"/>

                    <div class="row gx-4 gy-3">
                        <!-- Cột trái: Avatar -->
                        <div class="col-12 col-md-4 text-center">
                            <div class="avatar-wrapper" style="--avatar-size:240px">
                                <img id="avatarPreview"
                                     th:src="@{'/uploads/avatars/' + ${account.avt_path}}"
                                     alt="Avatar"
                                     class="avatar-img">
                                <label for="avatarInput" class="avatar-overlay">
                                    <i class="fa-solid fa-camera"></i>
                                    <span class="small">Đổi</span>
                                </label>
                                <input type="file" id="avatarInput" name="avatarFile" accept="image/*" onchange="previewImage(event)">
                            </div>
                        </div>

                        <!-- Cột phải: Thông tin -->
                        <div class="col-12 col-md-8">
                            <div class="row gy-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Họ tên</label>
                                    <input type="text" th:field="*{fullName}" class="form-control" required/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control" required/>
                                </div>
                                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Mật khẩu</label>
                                    <input type="password" th:field="*{password}" class="form-control" placeholder="Để trống nếu không đổi"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Điện thoại</label>
                                    <input type="text" th:field="*{phone}" class="form-control" required
                                           pattern="^0\d{9}$"
                                           title="Số điện thoại phải có 10 chữ số và bắt đầu bằng số 0"/>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Địa chỉ</label>
                                    <input type="text" th:field="*{address}" class="form-control"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Trạng thái</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option th:value="true"  th:selected="${account.status == true}">Active</option>
                                        <option th:value="false" th:selected="${account.status == false}">Inactive</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Nút hành động -->
                    <div class="mt-4 d-flex justify-content-center gap-2 w-100">
                        <button type="submit" class="btn btn-success">Cập nhật</button>
                        <a th:href="@{/accounts}" class="btn btn-outline-secondary">Quay lại</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="fragments/admin-footer :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>

</body>
</html>
