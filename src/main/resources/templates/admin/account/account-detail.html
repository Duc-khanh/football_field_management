<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <div class="d-flex align-items-center justify-content-between mb-4 gap-3">
                <h2 class="m-0">Thông tin tài khoản</h2>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary" th:href="@{/accounts}">
                        Quay lại
                    </a>
                </div>
            </div>

            <div class="table-responsive shadow-sm rounded-3 bg-white p-3">
                <div class="row gx-4 gy-3 align-items-start">
                    <!-- Avatar -->
                    <div class="col-12 col-md-3 text-center">
                        <img th:src="@{'/uploads/avatars/' + ${account.avt_path}}"
                             alt="Avatar"
                             class="img-fluid rounded-circle"
                             style="width:150px; height:150px; object-fit:cover;">
                        <div class="mt-3">
                            <span th:text="${account.fullName}" class="h5 d-block"></span>
                        </div>
                    </div>

                    <!-- Thông tin chi tiết -->
                    <div class="col-12 col-md-9">
                        <div class="row mb-2">
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Email</div>
                                <div th:text="${account.email}"></div>
                            </div>
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Phone</div>
                                <div th:text="${account.phone}"></div>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Address</div>
                                <div th:text="${account.address}"></div>
                            </div>
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Status</div>
                                <div>
                                    <span th:text="${account.status} ? 'Hoạt động' : 'Bị khóa'"
                                          th:classappend="${account.status} ? 'badge status-active' : 'badge status-block'">
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-12">
                                <div class="fw-bold">Roles</div>
                                <div class="mt-1">
                                    <span th:each="role : ${account.roles}"
                                          th:text="${role.role_name}"
                                          class="role-badge badge rounded-pill me-1 py-1 px-2">ROLE</span>
                                    <span th:if="${#lists.isEmpty(account.roles)}"
                                          class="text-muted">Không có role</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="footer">
    <div th:replace="fragments/admin-footer :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>

</body>
</html>
