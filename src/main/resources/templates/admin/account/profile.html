<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/avatar-edit.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragments/admin-header :: header}"></div>

<div class="d-flex flex-grow-1">

    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>

    <!-- Nội dung chính -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="flex-grow-1 p-4">

            <!-- Form chỉnh sửa hồ sơ -->
            <div class="container">
                <h3 class="mb-4">Sửa thông tin</h3>
                <form th:object="${account}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <!-- Avatar -->
                        <div class="col-12 col-md-4 text-center mb-4">
                            <div class="avatar-wrapper">
                                <img id="avatarPreview"
                                     th:src="${account.avt_path != null ? '/uploads/avatars/' + account.avt_path : '/images/avatar.png'}"
                                     alt="Avatar"
                                     class="avatar-img">
                                <label for="avatarInput" class="avatar-overlay">
                                    <i class="fa-solid fa-camera"></i> Sửa ảnh
                                </label>
                                <input type="file" id="avatarInput" name="avatarFile" accept="image/*"
                                       onchange="previewImage(event)">
                            </div>
                        </div>

                        <!-- Thông tin -->
                        <div class="col-12 col-md-8">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Họ và tên:</label>
                                <input type="text" id="fullName" th:field="*{fullName}" class="form-control">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email:</label>
                                    <input type="email" id="email" th:field="*{email}" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Số điện thoại:</label>
                                    <input type="text" id="phone" th:field="*{phone}" class="form-control">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label">Địa chỉ:</label>
                                <input type="text" id="address" th:field="*{address}" class="form-control">
                            </div>

                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-floppy-disk"></i> Cập nhật
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <!-- /Form chỉnh sửa -->

        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('avatarPreview').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
</body>
</html>
