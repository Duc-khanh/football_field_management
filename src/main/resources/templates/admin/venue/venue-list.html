<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách địa điểm sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <script th:src="@{/js/venue-admin.js}"></script>
</head>
<body class="d-flex flex-column min-vh-100">
<!-- Header -->
<div th:replace="fragments/headerAdmin :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <!-- Main Content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách sân bóng</h2>

            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/admin/venue/list}" method="get"
                      class="search-form d-flex gap-2 mb-0" id="searchForm">
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input"
                           placeholder="Tìm kiếm..."
                           style="width: 300px;">
                    <select name="status" id="statusFilter" class="form-select" style="width: 150px;">
                        <option value="">-- Tất cả --</option>
                        <option value="true" th:selected="${status == true}">Mở</option>
                        <option value="false" th:selected="${status == false}">Đóng</option>
                    </select>
                </form>

                <a class="btn btn-primary" th:href="@{/admin/venue/add}">
                    Thêm sân bóng
                </a>
            </div>

            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3 d-flex justify-content-center">
                <table class="table table-hover align-middle admin-table mb-0 text-center">
                    <thead class="table-light">
                    <tr>
                        <th>STT</th>
                        <th>Ảnh</th>
                        <th>Tên sân</th>
                        <th>Chủ sân</th>
                        <th>Địa chỉ</th>
                        <th>Số điện thoại</th>
                        <th>Mô tả</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="venue, stat : ${venues}">
                        <td th:text="${currentPage * pageSize + stat.index + 1}"></td>
                        <td>
                            <img th:src="@{${venue.mainImagePath != null ? '/uploads/avatars/' + venue.mainImagePath : '/images/broken-image.png'}}"
                                 alt="Ảnh sân"
                                 style="width:120px; height:80px; object-fit:cover; border-radius:5px;">
                        </td>
                        <td th:text="${venue.venueName}"></td>
                        <td th:text="${venue.ownerName} ?: 'Chưa cập nhật'"></td>
                        <td th:text="${venue.address}"></td>
                        <td th:text="${venue.contactNumber}"></td>
                        <td th:text="${venue.description}"></td>
                        <td>
                            <span th:text="${venue.status} ? 'Mở' : 'Đóng'"
                                  th:classappend="${venue.status} ? 'badge status-active' : 'badge status-block'">
                            </span>
                        </td>
                        <td class="actions">
                            <!-- Edit -->
                            <a class="btn btn-warning me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               th:href="@{'/admin/venue/edit/' + ${venue.venueId}}"
                               title="Sửa" aria-label="Sửa">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </a>

                            <!-- View -->
                            <a class="btn btn-outline-primary me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               th:href="@{'/admin/venue/detail/' + ${venue.venueId}}"
                               title="Xem" aria-label="Xem">
                                <i class="fa-solid fa-eye"></i>
                            </a>

                            <!-- Toggle lock/unlock -->
                            <a th:href="@{'/admin/venue/status/' + ${venue.venueId} + '/false'}"
                               th:if="${venue.status}"
                               class="btn btn-danger d-inline-flex align-items-center justify-content-center btn-icon"
                               title="Click để đóng" aria-label="Đóng">
                                <i class="fa fa-lock"></i>
                            </a>
                            <a th:href="@{'/admin/venue/status/' + ${venue.venueId} + '/true'}"
                               th:if="${!venue.status}"
                               class="btn btn-success d-inline-flex align-items-center justify-content-center btn-icon"
                               title="Click để mở" aria-label="Mở">
                                <i class="fa fa-unlock"></i>
                            </a>
                        </td>

                    </tr>
                    <tr th:if="${#lists.isEmpty(venues)}">
                        <td colspan="9" class="text-center py-4 text-muted">Không có bản ghi nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/venue/list(page=${currentPage - 1}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/admin/venue/list(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/venue/list(page=${currentPage + 1}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
<!-- Footer -->
<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
</body>
</html>
