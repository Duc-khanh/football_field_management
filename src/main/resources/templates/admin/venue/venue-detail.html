<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <style>
        #content {
            max-width: 1200px;
            width: 100%;
            overflow-x: auto;
        }
        .venue-main-img {
            width: 250px;
            height: 180px;
            object-fit: cover;
        }
        .venue-sub-img {
            width: 120px;
            height: 90px;
            object-fit: cover;
        }
        .badge.status-active {
            background-color: #198754;
            color: white;
        }
        .badge.status-block {
            background-color: #dc3545;
            color: white;
        }
        .fw-bold {
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="fragments/admin-sidebar :: menuAdmin"></div>

    <!-- Main content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <!-- Tiêu đề + nút -->
            <div class="d-flex align-items-center justify-content-between mb-4 gap-3 flex-wrap">
                <h2 class="m-0">Chi tiết sân bóng</h2>
                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/admin/venue/list}" class="btn btn-outline-secondary">
                        <i class="fa fa-arrow-left"></i> Quay lại
                    </a>
                    <a th:href="@{'/admin/venue/edit/' + ${venue.venueId}}" class="btn btn-primary">
                        <i class="fa fa-edit"></i> Chỉnh sửa
                    </a>
                </div>
            </div>

            <!-- Box nội dung -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-3">
                <div class="row gx-4 gy-3 align-items-start">
                    <!-- Ảnh chính -->
                    <div class="col-12 col-md-4 text-center mb-3 mb-md-0">
                        <img th:src="@{'/uploads/avatars/' + ${venue.mainImagePath}}"
                             alt="Ảnh chính"
                             class="img-fluid rounded-3 venue-main-img">
                    </div>

                    <!-- Thông tin chi tiết -->
                    <div class="col-12 col-md-8">
                        <div class="row mb-2">
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Tên sân</div>
                                <div th:text="${venue.venueName} ?: 'Chưa cập nhật'"></div>
                            </div>
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Chủ sở hữu</div>
                                <div th:text="${venue.ownerName} ?: 'Chưa cập nhật'"></div>
                            </div>
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Số điện thoại</div>
                                <div th:text="${venue.contactNumber} ?: 'Chưa cập nhật'"></div>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Địa chỉ</div>
                                <div th:text="${venue.address} ?: 'Chưa cập nhật'"></div>
                            </div>
                            <div class="col-sm-6 mb-2">
                                <div class="fw-bold">Trạng thái</div>
                                <div>
                                    <span th:text="${venue.status} ? 'Hoạt động' : 'Không hoạt động'"
                                          th:classappend="${venue.status} ? 'badge status-active' : 'badge status-block'">
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Gallery -->
                <div class="mt-4">
                    <div class="fw-bold border-bottom pb-2 mb-3">Hình ảnh khác</div>
                    <div class="d-flex flex-wrap gap-3">
                        <div th:each="img : ${venue.images}">
                            <img th:src="@{'/uploads/avatars/' + ${img.photoPath}}"
                                 alt="Ảnh phụ"
                                 class="rounded venue-sub-img">
                        </div>
                    </div>
                </div>

                <!-- Mô tả -->
                <div class="mt-4">
                    <div class="fw-bold border-bottom pb-2 mb-3">Mô tả</div>
                    <p th:text="${venue.description}" class="text-muted"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="fragments/admin-footer :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
