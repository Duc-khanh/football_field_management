<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/homeAdmin.css}">
    <style>
        .venue-detail {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .venue-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .venue-header img {
            width: 200px;
            height: auto;
            border-radius: 10px;
            margin-right: 20px;
            object-fit: cover;
        }
        .venue-gallery img {
            width: 150px;
            height: 100px;
            object-fit: cover;
            margin: 5px;
            border-radius: 6px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="fragments/headerAdmin :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="fragments/menuAdmin :: menuAdmin"></div>

    <!-- Main content -->
    <div class="d-flex flex-column flex-grow-1 p-4">

<h2 class="mb-4">Chi tiết sân bóng</h2>

<div class="venue-detail">
    <!-- Header -->
    <div class="venue-header">
        <img th:src="@{'/uploads/avatars/' + ${venue.mainImagePath}}" alt="Main Image">
        <div>
            <h3 th:text="${venue.venueName}"></h3>
            <p><strong>Chủ sở hữu:</strong> <span th:text="${venue.ownerName} ?: 'Chưa cập nhật'"></span></p>
            <p><strong>Số điện thoại:</strong> <span th:text="${venue.contactNumber}"></span></p>
            <p><strong>Địa chỉ:</strong> <span th:text="${venue.address}"></span></p>
            <p><strong>Trạng thái:</strong>
                <span th:text="${venue.status} ? 'Hoạt động' : 'Không hoạt động'"></span>
            </p>
        </div>
    </div>

    <!-- Description -->
    <div class="mb-3">
        <h5>Mô tả</h5>
        <p th:text="${venue.description}"></p>
    </div>

    <!-- Gallery -->
    <div class="mb-3">
        <h5>Hình ảnh khác</h5>
        <div class="venue-gallery d-flex flex-wrap">
            <img th:each="img : ${venue.images}"
                 th:src="@{'/uploads/avatars/' + ${img.photoPath}}"
                 class="img-thumbnail"
                 style="width:150px; height:100px; object-fit:cover; margin:5px; border-radius:6px;"
                 alt="Sub Image">
        </div>
    </div>

    <!-- Action -->
    <div class="mt-3">
        <a th:href="@{/admin/venue/list}" class="btn btn-secondary">
            <i class="fa fa-arrow-left"></i> Quay lại danh sách
        </a>
        <a th:href="@{'/admin/venue/edit/' + ${venue.venueId}}" class="btn btn-primary">
            <i class="fa fa-edit"></i> Chỉnh sửa
        </a>
    </div>
</div>
    </div>
</div>
<div id="footer">
    <div th:replace="fragments/footerAdmin :: adminFooter"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
