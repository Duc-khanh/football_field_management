<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thống kê doanh thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #56ab2f, #a8e6cf);
            --warning-gradient: linear-gradient(135deg, #f093fb, #f5576c);
            --info-gradient: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        
        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .dashboard-header {
            background: var(--primary-gradient);
            color: white;
            padding: 2rem 0;
            margin: -1rem -1rem 2rem -1rem;
            text-align: center;
            border-radius: 0 0 20px 20px;
        }
        
        .filter-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
            margin-bottom: 2rem;
        }
        
        .filter-card .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline-secondary {
            border: 2px solid #6b7280;
            color: #6b7280;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-outline-secondary:hover {
            background: #6b7280;
            border-color: #6b7280;
            transform: translateY(-2px);
        }
        
        .kpi-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
            transition: all 0.3s ease;
            height: 100%;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .kpi-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 1rem;
        }
        
        .kpi-icon.revenue { background: var(--success-gradient); }
        .kpi-icon.orders { background: var(--info-gradient); }
        .kpi-icon.average { background: var(--warning-gradient); }
        
        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.25rem;
        }
        
        .kpi-label {
            color: #6b7280;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
            margin-bottom: 2rem;
        }
        
        .chart-card h5 {
            color: #1f2937;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        .table-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table thead th {
            background: #f8fafc;
            border: none;
            color: #374151;
            font-weight: 600;
            padding: 1rem;
        }
        
        .table tbody td {
            padding: 1rem;
            border-color: #f3f4f6;
            vertical-align: middle;
        }
        
        .table tbody tr:hover {
            background: #f8fafc;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #9ca3af;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body class="p-3">

<div class="dashboard-header">
    <h1><i class="fas fa-chart-line me-2"></i>Thống kê doanh thu</h1>
    <p class="mb-0 opacity-75">Theo dõi và phân tích doanh thu hệ thống</p>
</div>

<!-- Filter Form -->
<div class="filter-card">
    <form class="row g-3" method="get" th:action="@{/admin/revenue}">
        <div class="col-md-3">
            <label class="form-label"><i class="fas fa-calendar-alt me-1"></i>Từ ngày</label>
            <input type="date" class="form-control" name="from" th:value="${from}">
        </div>
        <div class="col-md-3">
            <label class="form-label"><i class="fas fa-calendar-alt me-1"></i>Đến ngày</label>
            <input type="date" class="form-control" name="to" th:value="${to}">
        </div>
        <div class="col-md-3">
            <label class="form-label"><i class="fas fa-layer-group me-1"></i>Nhóm theo</label>
            <select class="form-select" name="groupBy">
                <option th:value="DAY"   th:selected="${groupBy.name() == 'DAY'}">Ngày</option>
                <option th:value="MONTH" th:selected="${groupBy.name() == 'MONTH'}">Tháng</option>
                <option th:value="YEAR"  th:selected="${groupBy.name() == 'YEAR'}">Năm</option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-end gap-2">
            <button class="btn btn-primary flex-fill">
                <i class="fas fa-filter me-1"></i>Lọc
            </button>
            <a class="btn btn-outline-secondary"
               th:href="@{/admin/revenue/export(from=${from},to=${to},groupBy=${groupBy})}">
                <i class="fas fa-download me-1"></i>Xuất CSV
            </a>
        </div>
    </form>
</div>

<!-- KPI Cards -->
<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="kpi-card">
            <div class="kpi-icon revenue">
                <i class="fas fa-money-bill-wave"></i>
            </div>
            <div class="kpi-value"
                 th:text="${summary != null ? #numbers.formatDecimal(summary.totalRevenue,1,'POINT',2,'COMMA') + ' đ' : '0 đ'}"></div>
            <div class="kpi-label">Tổng doanh thu</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="kpi-card">
            <div class="kpi-icon orders">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <div class="kpi-value" th:text="${summary != null ? summary.totalOrders : 0}"></div>
            <div class="kpi-label">Tổng số đơn</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="kpi-card">
            <div class="kpi-icon average">
                <i class="fas fa-calculator"></i>
            </div>
            <div class="kpi-value"
                 th:text="${summary != null ? #numbers.formatDecimal(summary.avgOrderValue,1,'POINT',2,'COMMA') + ' đ' : '0 đ'}"></div>
            <div class="kpi-label">Giá trị trung bình/đơn</div>
        </div>
    </div>
</div>

<!-- Chart -->
<div class="chart-card">
    <h5><i class="fas fa-chart-area me-2"></i>Biểu đồ doanh thu theo thời gian</h5>
    <canvas id="revenueChart" height="120"></canvas>
</div>

<!-- Data Table -->
<div class="table-card">
    <h5><i class="fas fa-table me-2"></i>Bảng chi tiết doanh thu</h5>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th><i class="fas fa-tag me-1"></i>Thời gian</th>
                <th><i class="fas fa-shopping-cart me-1"></i>Số đơn</th>
                <th><i class="fas fa-money-bill-wave me-1"></i>Doanh thu</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${series}">
                <td>
                    <strong th:text="${p != null ? p.label : ''}"></strong>
                </td>
                <td>
                    <span class="badge bg-info" th:text="${p != null ? p.orders : 0}"></span>
                </td>
                <td>
                    <strong class="text-success" th:text="${p != null ? #numbers.formatDecimal(p.amount,1,'POINT',2,'COMMA') + ' đ' : '0 đ'}"></strong>
                </td>
            </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(series)}" class="empty-state">
            <i class="fas fa-chart-line"></i>
            <h5>Không có dữ liệu</h5>
            <p>Thử thay đổi khoảng thời gian để xem dữ liệu</p>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const labels = [
        <th:block th:each="p,iter : ${#lists.select(series, s -> s != null)}">
            "[[${p.label}]]"<th:block th:if="${!iter.last}">,</th:block>
        </th:block>
    ];
    const amounts = [
        <th:block th:each="p,iter : ${#lists.select(series, s -> s != null)}">
            [[${p.amount}]]<th:block th:if="${!iter.last}">,</th:block>
        </th:block>
    ];

    if (labels.length > 0) {
        const ctx = document.getElementById('revenueChart');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Doanh thu',
                    data: amounts,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#667eea',
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { 
                        display: true,
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            padding: 20,
                            font: {
                                size: 14,
                                weight: '600'
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleColor: '#ffffff',
                        bodyColor: '#ffffff',
                        borderColor: '#667eea',
                        borderWidth: 1,
                        cornerRadius: 10,
                        displayColors: false,
                        callbacks: {
                            label: function (context) {
                                let value = context.raw || 0;
                                return 'Doanh thu: ' + value.toLocaleString('vi-VN') + ' đ';
                            }
                        }
                    }
                },
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: {
                                size: 12
                            },
                            color: '#6b7280'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(0,0,0,0.05)',
                            lineWidth: 1
                        },
                        ticks: {
                            font: {
                                size: 12
                            },
                            color: '#6b7280',
                            callback: function (value) {
                                return value.toLocaleString('vi-VN') + ' đ';
                            }
                        }
                    }
                }
            }
        });
    } else {
        // Hide chart if no data
        document.querySelector('.chart-card').style.display = 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
