<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doanh thu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragments/admin-header :: header}"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>

    <!-- Main content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="flex-grow-1 p-4">
            <h2>Doanh thu năm <span th:text="${year}"></span></h2>

            <div class="card p-4 shadow-sm rounded-3 mb-4">
                <canvas id="multiRevenueChart" width="900" height="400"></canvas>
            </div>
        </div>

        <!-- Render dữ liệu JSON -->
        <script id="revenueData" type="application/json"
                th:utext="${revenueMapJson}"></script>

        <!-- File JS ngoài -->
        <script th:src="@{/js/chart.js}"></script>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/admin-footer :: adminFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script th:src="@{/js/home-admin.js}"></script>
</body>
</html>
