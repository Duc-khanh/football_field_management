<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doanh thu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <script th:src="@{js/summary.js}"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .filter-row {
            margin-left: 20px;
            margin-right: 20px;
        }
        .stats-card {
            display: block;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stats-title {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            white-space: normal;
            text-align: left;
        }

        .stats-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            text-align: left;
        }
        .stats-title { display: block !important; white-space: normal !important; }
        .stats-value { display: block !important; }
        .text-success {
            color: #28a745; /* xanh lá */
        }
        .text-danger {
            color: #dc3545; /* đỏ */
        }
        .text-secondary {
            color: #6c757d; /* xám */
        }

    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- Header -->
<div th:replace="~{fragments/admin-header :: header}"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>

    <!-- Main content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="flex-grow-1 p-4">
            <div class="row g-4 mb-4" id="statusSummary">
                <!-- Doanh thu hôm nay -->
                <div class="col-xl-3 col-md-6">
                    <div class="stats-card">
                        <p class="stats-title">Doanh thu hôm nay</p>
                        <p class="stats-value">
                <span id="todayRevenueCard"
                      th:text="${#numbers.formatDecimal(todayRevenue,0,'COMMA',0,'POINT')} + ' VND'">
                    0 VND
                </span>
                            <span id="growthPercentCard"
                                  th:if="${growthPercent != null}"
                                  th:class="${isUp} ? 'text-success fw-bold' : (${isDown} ? 'text-danger fw-bold' : 'text-secondary')">
                    <span th:text="${growthPercent}">0</span>%
                    <i th:if="${isUp}" class="fas fa-arrow-up"></i>
                    <i th:if="${isDown}" class="fas fa-arrow-down"></i>
                </span>
                        </p>
                    </div>
                </div>

                <!-- Tổng doanh thu -->
                <div class="col-xl-3 col-md-6">
                    <div class="stats-card">
                        <p class="stats-title">Tổng doanh thu</p>
                        <p class="stats-value">
                <span id="totalRevenueCard"
                      th:text="${#numbers.formatDecimal(totalRevenue,0,'COMMA',0,'POINT')} + ' VND'">
                    0 VND
                </span>
                        </p>
                    </div>
                </div>

                <!-- Tổng đơn hàng -->
                <div class="col-xl-3 col-md-6">
                    <div class="stats-card">
                        <p class="stats-title">Tổng đơn hàng</p>
                        <p class="stats-value">
                <span id="ordersCard"
                      th:text="${ordersThisMonth.size()}">0</span>
                        </p>
                    </div>
                </div>

                <!-- Tổng người mua -->
                <div class="col-xl-3 col-md-6">
                    <div class="stats-card">
                        <p class="stats-title">Tổng người mua</p>
                        <p class="stats-value">
                <span id="buyersCard"
                      th:text="${buyersThisMonth}">0</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
            <div class="mb-3 d-flex align-items-center gap-3 filter-row">
            <label class="fw-bold mb-0">Năm:</label>
            <select id="yearSelect" class="form-select w-auto">
                <option th:each="y : ${years}"
                        th:value="${y}"
                        th:text="${y}"
                        th:selected="${y == year}">
                </option>
            </select>

            <label class="fw-bold mb-0">Tháng:</label>
            <select id="monthSelect" class="form-select w-auto">
                <option value="">-- Tất cả --</option>
                <option th:each="m : ${#numbers.sequence(1,12)}"
                        th:value="${m}"
                        th:text="'Tháng ' + ${m}">
                </option>
            </select>
        </div>

        <div class="card p-4 shadow-sm rounded-3 mb-4 filter-row">
            <canvas id="multiRevenueChart" width="900" height="400"></canvas>
        </div>
    </div>

    <!-- Render dữ liệu JSON -->
    <script id="revenueData" type="application/json"
            th:utext="${revenueMapJson}"></script>

    <!-- File JS ngoài -->
    <script th:src="@{/js/chart.js}"></script>
</div>

<!-- Footer -->
<div th:replace="~{fragments/admin-footer :: adminFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script th:src="@{/js/home-admin.js}"></script>
</body>
</html>
