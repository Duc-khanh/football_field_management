<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cour.courId != null ? 'Chỉnh sửa sân bóng' : 'Thêm sân bóng mới'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
</head>
<body class="d-flex flex-column min-vh-100"
      th:data-success-message="${successMessage}"
      th:data-error-message="${errorMessage}">

<!-- Header -->
<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <!-- Nội dung -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="mb-4" th:text="${cour.courId != null ? 'Chỉnh sửa sân bóng' : 'Thêm sân bóng mới'}"></h2>

            <div class="card shadow-sm rounded-3">
                <div class="card-body">
                    <form th:action="${cour.courId != null} ? @{'/cour/edit/' + ${cour.courId}} : @{/cour/create}"
                          method="post" th:object="${cour}">
                        <div class="row">
                            <!-- Cột trái -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên sân</label>
                                    <input type="text" th:field="*{courName}" class="form-control" required/>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Giá thuê (VND/giờ)</label>
                                    <input type="number" th:field="*{pricePerHour}" class="form-control" required/>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Kích thước</label>
                                    <input type="text" th:field="*{fieldSize}" class="form-control"/>
                                </div>
                            </div>

                            <!-- Cột phải -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Loại mặt sân</label>
                                    <input type="text" th:field="*{surfaceType}" class="form-control"/>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Đèn</label>
                                    <select th:field="*{lightsAvailable}" class="form-select">
                                        <option th:value="true">Có</option>
                                        <option th:value="false">Không</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Trạng thái</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option th:value="true">Hoạt động</option>
                                        <option th:value="false">Ngừng hoạt động</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Hàng riêng cho địa điểm (cần full width) -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa điểm</label>
                            <select th:field="*{venue}" class="form-select">
                                <option value="">-- Chọn địa điểm --</option>
                                <option th:each="venue : ${venues}"
                                        th:value="${venue.venueId}"
                                        th:selected="${cour.venue != null and venue.venueId == cour.venue.venueId}"
                                        th:text="${venue.venueName}">
                                </option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-floppy-disk me-1"></i> Lưu
                            </button>
                            <a th:href="@{/cour}" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left me-1"></i> Hủy
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
</body>
</html>
