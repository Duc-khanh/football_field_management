<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sân bóng</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2>Chi tiết sân bóng</h2>

<table class="table table-bordered">
    <tr>
        <th>Mã sân</th>
        <td th:text="${cour.courId}"></td>
    </tr>
    <tr>
        <th>Tên sân</th>
        <td th:text="${cour.courName}"></td>
    </tr>
    <tr>
        <th>Giá thuê (VND/giờ)</th>
        <td th:text="${cour.pricePerHour}"></td>
    </tr>
    <tr>
        <th>Kích thước</th>
        <td th:text="${cour.fieldSize}"></td>
    </tr>
    <tr>
        <th>Loại mặt sân</th>
        <td th:text="${cour.surfaceType}"></td>
    </tr>
    <tr>
        <th>Đèn</th>
        <td th:text="${cour.lightsAvailable ? 'Có' : 'Không'}"></td>
    </tr>
    <tr>
        <th>Trạng thái</th>
        <td th:text="${cour.status ? 'Hoạt động' : 'Ngừng hoạt động'}"></td>
    </tr>
    <tr>
        <th>Địa điểm</th>
        <td th:text="${cour.venue != null ? cour.venue.venueName : 'Chưa có'}"></td>
    </tr>
</table>

<a th:href="@{/cour}" class="btn btn-secondary">Quay lại</a>

</body>
</html>
