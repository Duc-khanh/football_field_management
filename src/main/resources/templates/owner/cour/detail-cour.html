<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <style>
        /* Giữ chữ thường */
        h2, th, td, .btn {
            text-transform: none !important;
        }


        /* Bảng gọn hơn */
        .table th {
            width: 220px;
            background: #f8f9fa;
            font-weight: 500;
        }

        .table td {
            color: #495057;
        }

        /* Nút */
        .btn {
            border-radius: 8px;
            padding: 6px 16px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Header -->
<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>

    <!-- Nội dung -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="mb-4">Chi tiết sân bóng
            </h2>

            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">
                    <table class="table table-bordered table-hover mb-3">
                        <tbody>
                        <tr>
                            <th>Mã sân</th>
                            <td th:text="${cour.courId}"></td>
                        </tr>
                        <tr>
                            <th>Tên sân</th>
                            <td th:text="${cour.courName}"></td>
                        </tr>
                        <tr>
                            <th>Giá thuê (VND/giờ)</th>
                            <td th:text="${cour.pricePerHour}"></td>
                        </tr>
                        <tr>
                            <th>Kích thước</th>
                            <td th:text="${cour.fieldSize}"></td>
                        </tr>
                        <tr>
                            <th>Loại mặt sân</th>
                            <td th:text="${cour.surfaceType}"></td>
                        </tr>
                        <tr>
                            <th>Đèn</th>
                            <td th:text="${cour.lightsAvailable ? 'Có' : 'Không'}"></td>
                        </tr>
                        <tr>
                            <th>Trạng thái</th>
                            <td>
                                <span th:if="${cour.status}" class="badge bg-success">Hoạt động</span>
                                <span th:if="${!cour.status}" class="badge bg-danger">Ngừng hoạt động</span>
                            </td>
                        </tr>
                        <tr>
                            <th>Địa điểm</th>
                            <td th:text="${cour.venue != null ? cour.venue.venueName : 'Chưa có'}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="text-end">
                        <a th:href="@{/cour}" class="btn btn-secondary">
                            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script th:src="@{/js/home-admin.js}"></script>
</body>
</html>
