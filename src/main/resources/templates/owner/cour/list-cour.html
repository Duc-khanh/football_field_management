<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <style>
        .form-select {
            width: 200px;
            min-width: 150px;
            max-width: 250px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            cursor: pointer;
        }
        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 4px rgba(13,110,253,0.4);
        }

        .search-input {
            width: 250px;   /* ngắn gọn vừa phải */
            flex: none;     /* không kéo dãn full */
        }
        .table td,
        .table th {
            text-align: center;
            vertical-align: middle; /* căn giữa theo chiều dọc */
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100"
      th:data-success-message="${successMessage}"
      th:data-error-message="${errorMessage}">

<!-- Header -->
<div th:replace="fragments/owner-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <!-- Nội dung -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách sân bóng</h2>

            <!-- Bộ lọc + tìm kiếm -->
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/cour}" method="get"
                      class="search-form d-flex flex-grow-1 gap-2 mb-0" id="searchForm">

                    <!-- Ô tìm kiếm -->
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input"
                           placeholder="Tìm kiếm..." id="searchInput">

                    <!-- Lọc trạng thái -->
                    <select id="statusSelect" name="status" class="form-select">
                        <option value="">-- Chọn trạng thái --</option>
                        <option value="true" th:selected="${statusFilter == true}">Hoạt động</option>
                        <option value="false" th:selected="${statusFilter == false}">Ngừng hoạt động</option>
                    </select>
                </form>


                <!-- Nút thêm sân bóng -->
                <a class="btn btn-primary" th:href="@{/cour/create}">
                    Thêm sân bóng
                </a>
            </div>

            <!-- Bảng -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width:70px">STT</th>
                        <th style="width:80px">Ảnh</th>
                        <th>Tên sân</th>
                        <th>Giá/giờ</th>
                        <th>Kích thước</th>
                        <th>Mặt sân</th>
                        <th>Đèn</th>
                        <th>Địa điểm</th>
                        <th>Trạng thái</th>
                        <th style="width:150px">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, st : ${cours}">
                        <td th:text="${currentPage * pageSize + st.index + 1}"></td>
                        <td>
                            <img th:src="${c.image != null and !#strings.isEmpty(c.image)
                  ? '/uploads/avatars/' + c.image
                  : '/images/broken-image.png'}"
                                 alt="Ảnh sân"
                                 class="img-thumbnail"
                                 style="width: 80px; height: 60px; object-fit: cover;">
                        </td>

                        <td th:text="${c.courName}"></td>
                        <td th:text="${#numbers.formatDecimal(c.pricePerHour, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td th:text="${c.fieldSize}"></td>
                        <td th:text="${c.surfaceType}"></td>
                        <td th:text="${c.lightsAvailable ? 'Có' : 'Không'}"></td>
                        <td th:text="${c.venue != null ? c.venue.venueName : 'Chưa có'}"></td>
                        <td>
                            <span th:text="${c.status ? 'Hoạt động' : 'Ngừng'}"
                                  th:classappend="${c.status} ? 'badge status-active' : 'badge status-block'">
                            </span>
                        </td>
                        <td class="actions">
                            <a th:href="@{/cour/edit/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-warning me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               title="Sửa"><i class="fa-solid fa-pen-to-square"></i></a>
                            <a th:href="@{/cour/detail/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-outline-primary me-1 d-inline-flex align-items-center justify-content-center btn-icon"
                               title="Chi tiết"><i class="fa-solid fa-eye"></i></a>
                            <a th:href="@{/cour/delete/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-danger d-inline-flex align-items-center justify-content-center btn-icon"
                               title="Xóa"
                               onclick="return confirm('Bạn có chắc muốn xóa?')">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cours)}">
                        <td colspan="9" class="text-center py-4 text-muted">Không có bản ghi nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Phân trang -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/cour(page=${currentPage - 1}, status=${statusFilter})}">
                            Trước
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/cour(page=${i}, status=${statusFilter})}"
                           th:text="${i + 1}">
                        </a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/cour(page=${currentPage + 1}, status=${statusFilter})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const statusSelect = document.getElementById("statusSelect");
        const form = statusSelect?.closest("form");
        if (statusSelect && form) {
            statusSelect.addEventListener("change", () => form.submit());
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
</body>
</html>
