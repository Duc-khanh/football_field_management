<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sân bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/account-list.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <style>
        .form-select {
            width: 200px;
            min-width: 150px;
            max-width: 250px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            cursor: pointer;
        }
        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 4px rgba(13,110,253,0.4);
        }
        .search-input {
            width: 250px;
            flex: none;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100"
      th:data-success-message="${successMessage}"
      th:data-error-message="${errorMessage}">

<div th:replace="fragments/admin-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <!-- Content -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách sân bóng</h2>

            <!-- Search + Add -->
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/cour}" method="get"
                      class="search-form d-flex flex-grow-1 gap-2 mb-0" id="searchForm">
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input"
                           placeholder="Tìm kiếm..." id="searchInput">

                    <select id="statusFilter" name="status" class="form-select">
                        <option value="" th:selected="${status == null or status == ''}">-- Trạng thái --</option>
                        <option value="true" th:selected="${status == true}">Hoạt động</option>
                        <option value="false" th:selected="${status == false}">Ngừng hoạt động</option>
                    </select>
                </form>

                <a class="btn btn-success" th:href="@{/cour/create}">
                    <i class="fa-solid fa-plus"></i> Thêm sân bóng
                </a>
            </div>

            <!-- Table -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>STT</th>
                        <th>Tên sân</th>
                        <th>Giá/giờ</th>
                        <th>Kích thước</th>
                        <th>Mặt sân</th>
                        <th>Đèn</th>
                        <th>Trạng thái</th>
                        <th>Địa điểm</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, st : ${cours}">
                        <td th:text="${currentPage * pageSize + st.index + 1}"></td>
                        <td th:text="${c.courName}"></td>
                        <td th:text="${c.pricePerHour}"></td>
                        <td th:text="${c.fieldSize}"></td>
                        <td th:text="${c.surfaceType}"></td>
                        <td th:text="${c.lightsAvailable ? 'Có' : 'Không'}"></td>
                        <td>
                            <span th:text="${c.status} ? 'Hoạt động' : 'Ngừng'"
                                  th:classappend="${c.status} ? 'badge status-active' : 'badge status-block'"></span>
                        </td>
                        <td th:text="${c.venue != null ? c.venue.venueName : 'Chưa có'}"></td>
                        <td class="actions">
                            <a th:href="@{/cour/edit/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-warning me-1">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </a>
                            <a th:href="@{/cour/detail/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <a th:href="@{/cour/delete/{id}(id=${c.courId})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Bạn có chắc muốn xóa?')">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cours)}">
                        <td colspan="9" class="text-center py-4 text-muted">Không có bản ghi nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/cour(page=${currentPage - 1}, keyword=${keyword})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/cour(page=${i}, keyword=${keyword})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/cour(page=${currentPage + 1}, keyword=${keyword})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div id="footer">
    <div th:replace="fragments/admin-footer :: adminFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const statusFilter = document.getElementById("statusFilter");
        const searchForm = document.getElementById("searchForm");

        if (statusFilter && searchForm) {
            statusFilter.addEventListener("change", () => {
                searchForm.submit();
            });
        }

        let typingTimer;
        const typingDelay = 900;
        const searchInput = document.getElementById("searchInput");

        if (searchInput) {
            searchInput.addEventListener("keyup", function () {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    searchForm.submit();
                }, typingDelay);
            });

            searchInput.addEventListener("keydown", function () {
                clearTimeout(typingTimer);
            });
        }
    });
</script>
</body>
</html>
