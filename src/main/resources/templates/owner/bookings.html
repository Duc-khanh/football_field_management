<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Booking của Sân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
    <style>
        .table td, .table th {
            text-align: center;
            vertical-align: middle;
        }
        .search-input {
            width: 250px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100"
      th:data-success-message="${successMessage}"
      th:data-error-message="${errorMessage}">

<!-- Header -->
<div th:replace="fragments/owner-header :: header"></div>

<div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>
    <script th:src="@{/js/alert-logout.js}"></script>

    <!-- Nội dung chính -->
    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách đặt sân của các Sân</h2>

            <!-- Bảng Booking -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Sân</th>
                        <th>Khách hàng</th>
                        <th>Điện thoại</th>
                        <th>Email</th>
                        <th>Ngày đặt</th>
                        <th>Giờ</th>
                        <th>Trạng thái</th>
                        <th>Giá</th>
                        <th>Ghi chú</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking, iterStat : ${bookings}">
                        <td th:text="${iterStat.count}">1</td>
                        <td th:text="${booking.cour.courName}">Sân A</td>
                        <td th:text="${booking.customerName}">Nguyen Van A</td>
                        <td th:text="${booking.phone}">0123456789</td>
                        <td th:text="${booking.email}">email@example.com</td>
                        <td th:text="${booking.bookingDate}">2025-11-29</td>
                        <td th:text="${booking.timeSlot.startTime} + ' - ' + ${booking.timeSlot.endTime}">07:00 - 08:00</td>
                        <td th:text="${booking.status}">PENDING</td>
                        <td th:text="${booking.totalPrice}">200000</td>
                        <td th:text="${booking.note}">Ghi chú</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="10" class="text-center py-4 text-muted">Chưa có danh sách đặt sân nào.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Phân trang -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/bookings(page=${currentPage - 1})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/bookings(page=${i})}"
                           th:text="${i + 1}">
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/bookings(page=${currentPage + 1})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- Footer -->
<div id="footer">
    <div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/home-admin.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/alert-notification.js}"></script>
</body>
</html>
