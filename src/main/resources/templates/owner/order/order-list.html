<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách đặt sân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/home-admin.css}">
    <link rel="stylesheet" th:href="@{/css/alert.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<div th:replace="fragments/owner-header :: header"></div>

<div class="d-flex flex-grow-1">
    <div th:replace="~{fragments/admin-sidebar :: menuAdmin}"></div>

    <div class="d-flex flex-column flex-grow-1">
        <div id="content" class="content p-4">
            <h2 class="m-0 mb-4">Danh sách đơn đặt sân</h2>

            <!-- Search + Filter -->
            <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
                <form th:action="@{/order}" method="get"
                      class="search-form d-flex flex-grow-1 gap-2 mb-0" id="searchForm">

                    <input type="text" name="keyword" th:value="${keyword}"
                           class="form-control search-input" placeholder="Tìm đơn hàng...">

                    <!-- filter trạng thái thanh toán -->
                    <select id="statusSelect" name="status" class="form-select">
                        <option value="">-- Thanh toán --</option>
                        <option value="PENDING" th:selected="${statusFilter == 'PENDING'}">Chờ thanh toán</option>
                        <option value="PAID" th:selected="${statusFilter == 'PAID'}">Đã thanh toán</option>
                        <option value="CANCEL" th:selected="${statusFilter == 'CANCEL'}">Hủy</option>
                    </select>
                </form>
            </div>

            <!-- Table -->
            <div class="table-responsive shadow-sm rounded-3 bg-white p-2 mb-3">
                <table class="table table-hover align-middle admin-table mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>STT</th>
                        <th>Tên sân</th>
                        <th>Khung giờ</th>
                        <th>Ngày đặt</th>
                        <th>Khách hàng</th>
                        <th>Giá</th>
                        <th>Thanh toán</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="o, st : ${orders}">
                        <td th:text="${currentPage * pageSize + st.index + 1}"></td>
                        <td th:text="${o.cour.courName}"></td>
                        <td th:text="${o.timeSlot.startTime + ' - ' + o.timeSlot.endTime}"></td>
                        <td th:text="${o.bookingDate}"></td>
                        <td>
                            <div th:text="${o.customerName}"></div>
                            <small class="text-muted" th:text="${o.phone}"></small>
                        </td>
                        <td th:text="${o.price + ' đ'}"></td>

                        <td>
                            <span class="badge"
                                  th:classappend="${
                                      o.payment.status == 'PAID' ? 'bg-success' :
                                      (o.payment.status == 'PENDING' ? 'bg-warning' : 'bg-danger')
                                  }"
                                  th:text="${o.payment.status}">
                            </span>
                        </td>

                        <td>
                            <a th:href="@{/order/detail/{id}(id=${o.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="8" class="text-center py-4 text-muted">Không có đơn đặt sân nào</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" class="mt-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/order(page=${currentPage - 1}, keyword=${keyword}, status=${statusFilter})}">
                            Trước
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/order(page=${i}, keyword=${keyword}, status=${statusFilter})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/order(page=${currentPage + 1}, keyword=${keyword}, status=${statusFilter})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>

</body>
</html>
