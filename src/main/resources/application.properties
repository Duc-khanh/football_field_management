spring.application.name=football_field_management

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/FootballBooking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}



# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# File Upload (ngoÓi resources ?? build JAR kh¶ng b? m?t file)
# VĒ d?: D:/uploads/avatars
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=C:/uploads/avatars
#file.upload-dir=D:/uploads/avatars

# ===============================
# JWT Configuration
jwt.secret=MySuperPrivateJwtSecretKeyThatIsLongEnough1234567890!!!
jwt.expiration=86400000


# ===============================
# SQL Init (b?t n?u c¾ schema.sql ho?c data.sql)
# ===============================
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ===============================
# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}


